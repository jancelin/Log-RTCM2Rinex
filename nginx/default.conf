server {
  listen 80;
  server_name _;

  charset utf-8;

  # ─── Accueil statique ────────────────────────────────────────────────────
  location = / {
    root /usr/share/nginx/html;
    try_files /index.html =404;
  }

  # ─── WebStat UI — protégée par Basic Auth ────────────────────────────────
  # Fichier htpasswd monté via docker-compose :
  #   ./config/webstat.htpasswd  →  /etc/nginx/.htpasswd-webstat
  # Génération : ./scripts/gen-webstat-htpasswd.sh <username>
  location /webstat/ {
    auth_basic "Centipede WebStat";
    auth_basic_user_file /etc/nginx/.htpasswd-webstat;

    alias /usr/share/nginx/html/webstat/;
    try_files $uri $uri/ /webstat/index.html;
  }

  # ─── WebStat données (CSV / JSON) ────────────────────────────────────────
  # Même protection que l'UI, pas de cache.
  location /webstat-data/ {
    auth_basic "Centipede WebStat";
    auth_basic_user_file /etc/nginx/.htpasswd-webstat;

    alias /srv/pub/stats/;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
  }

  # ─── Redirections sans slash final ───────────────────────────────────────
  location = /centipede_30s { return 301 /centipede_30s/; }
  location = /centipede_1s  { return 301 /centipede_1s/; }

  # ─── Produit 30s (listing + téléchargement) ──────────────────────────────
  location /centipede_30s/ {
    alias /srv/pub/centipede_30s/;
    autoindex on;
    autoindex_format html;
    autoindex_exact_size off;
    autoindex_localtime off;
    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '<head>' '<head><style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;font-size:18px;line-height:1.35;padding:12px;}
      pre{font-size:18px;}
      a{color:#0b57d0;text-decoration:none;}
      a:hover{text-decoration:underline;}
    </style>';
  }
  location ~ ^/centipede_30s/(.+[^/])$ {
    alias /srv/pub/centipede_30s/$1;
    types { }
    default_type application/octet-stream;
    add_header Content-Disposition 'attachment' always;
    add_header X-Content-Type-Options 'nosniff' always;
  }

  # ─── Produit 1s (listing + téléchargement) ───────────────────────────────
  location /centipede_1s/ {
    alias /srv/pub/centipede_1s/;
    autoindex on;
    autoindex_format html;
    autoindex_exact_size off;
    autoindex_localtime off;
    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '<head>' '<head><style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;font-size:18px;line-height:1.35;padding:12px;}
      pre{font-size:18px;}
      a{color:#0b57d0;text-decoration:none;}
      a:hover{text-decoration:underline;}
    </style>';
  }
  location ~ ^/centipede_1s/(.+[^/])$ {
    alias /srv/pub/centipede_1s/$1;
    types { }
    default_type application/octet-stream;
    add_header Content-Disposition 'attachment' always;
    add_header X-Content-Type-Options 'nosniff' always;
  }

  # ─── Tout le reste : interdit ─────────────────────────────────────────────
  location / {
    return 404;
  }
}
