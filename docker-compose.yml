services:

  # ─── RTCM logger ──────────────────────────────────────────────────────────
  logger:
    build: .
    image: centipede-logger:local
    container_name: centipede_logger
    env_file: ./config/.env
    volumes:
      - ./data:/data
      - ./scripts:/opt/scripts:rw
      - ./config:/config:ro
    command: ["/opt/scripts/logger-manager.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/scripts/healthcheck-logger.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Convertisseur 1s (horaire, heure précédente) ─────────────────────────
  converter1s:
    build: .
    image: centipede-logger:local
    container_name: centipede_converter1s
    env_file: ./config/.env
    environment:
      - CONVERTER_NAME=converter1s
      - FORCE_RINEX_HOURLY_ENABLE=true
      - FORCE_RINEX_DAILY_ENABLE=false
      - FORCE_CLEANUP_ENABLE=false
      - FORCE_TMP_ROOT=/dev/shm/converter1s
    shm_size: '3g'
    volumes:
      - ./data:/data
      - ./scripts:/opt/scripts:rw
      - ./config:/config:ro
    command: ["/opt/scripts/converter1s.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/scripts/healthcheck-converter.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Convertisseur 30s (quotidien, veille) ────────────────────────────────
  converter30s:
    build: .
    image: centipede-logger:local
    container_name: centipede_converter30s
    env_file: ./config/.env
    environment:
      - CONVERTER_NAME=converter30s
      - FORCE_RINEX_HOURLY_ENABLE=false
      - FORCE_RINEX_DAILY_ENABLE=true
      - FORCE_CLEANUP_ENABLE=true
      - FORCE_TMP_ROOT=/dev/shm/converter30s
    shm_size: '5g'
    volumes:
      - ./data:/data
      - ./scripts:/opt/scripts:rw
      - ./config:/config:ro
    command: ["/opt/scripts/converter30s.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/scripts/healthcheck-converter.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Nginx (publication + webstat) ────────────────────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: centipede_web
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-81}:80"
    volumes:
      - ./data/pub:/srv/pub:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      # ⚠️  Créer ce fichier AVANT de démarrer (voir scripts/gen-webstat-htpasswd.sh)
      - ./config/webstat.htpasswd:/etc/nginx/.htpasswd-webstat:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  # ─── Service stat : métriques légères toutes les 30 min ───────────────────
  # Calcule des agrégats par (date, produit) sur les *.crx.gz de PUB_ROOT,
  # et écrit dans /data/pub/stats/ :
  #   metrics_latest.json   → résumés today / 7j / 30j / all
  #   metrics_daily.csv     → historique par jour
  # La page /webstat/ (nginx) les expose en lecture (chemin /webstat-data/).
  stat:
    build: ./stat
    image: centipede-stat:local
    container_name: centipede_stat
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
      - PUB_ROOT=/srv/pub
      - STATS_DIR=/srv/pub/stats
      - SCAN_DAYS=${WEBSTAT_SCAN_DAYS:-60}
      - SLEEP_SECONDS=${WEBSTAT_SLEEP_SECONDS:-1800}
    volumes:
      - ./data/pub:/srv/pub:rw

  # ─── querydb (optionnel) ──────────────────────────────────────────────────
  querydb:
    build: ./querydb
    image: centipede-querydb:local
    container_name: centipede_querydb
    profiles: ["querydb"]
    env_file: ./config/.env
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./config:/config:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
